<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="style.css">
<title>PC Mestre</title>

</head>
<body>

<div class="grain"></div>

<div class="desktop">
  <div class="window" role="application" aria-label="Timer 20 minutos">
    <div class="titlebar">
      <div class="left">
        <div class="logo">XP</div>
        <div class="title">Timer</div>
      </div>
      <div class="controls">
        <button title="Minimizar">–</button>
        <button title="Maximizar">□</button>
        <button title="Fechar">×</button>
      </div>
    </div>

    <script type="module">
  import Typebot from 'https://cdn.jsdelivr.net/npm/@typebot.io/js@0/dist/web.js'

  Typebot.initBubble({
    typebot: "my-typebot-rguqm6e",
    previewMessage: {
      message: "Precisa de ajuda? Clique em mim!",
      autoShowDelay: 5000,
      avatarUrl:
        "https://static.gosquared.com/images/april/clippy/icon_clippy_01@2x.png",
    },
    theme: {
      button: {
        backgroundColor: "",
        customIconSrc:
          "https://s3.typebot.io/public/workspaces/cmhb0neri002bkx04zaielmn3/typebots/cmhb0nu9l0008jv04zrguqm6e/bubble-icon?v=1761686534252",
      },
      chatWindow: { backgroundColor: "#f1f1f1 50" },
    },
  });
</script>


    <div class="content">
      <div class="left-pane">
        <div class="big-timer">
          <div class="circle" id="circle" style="--p:0deg">
            <div class="inner">
              <div class="time" id="display">20:00</div>
              <div class="sub">Tempo restante</div>
            </div>
          </div>


         
        </div>
         <div style="flex:1">

            <div class="controls" style="margin-top:18px">
              <button class="btn" id="startBtn">Start</button>
              <button class="btn secondary" id="pauseBtn">Pause</button>
              <button class="btn secondary" id="resetBtn">Reset</button>
            </div>

          </div>

        <div style="margin-top:16px" class="panel">
          <h3>Status do Timer</h3>
          <p id="statusText">Pressione <strong>Start</strong> para iniciar.</p>

          <div class="toggles" style="margin-top:10px">
            <label style="display:flex;gap:8px;align-items:center">
              <input type="checkbox" id="autoReset"> Auto-reset no fim
            </label>

          </div>
        </div>

      </div> 

      <div class="right-pane">
        
      </div>

    </div>
  </div>
</div>

<div id="overlay-defeat" class="overlay" aria-hidden="true">
  <div class="card">
    <img src="data:image/svg+xml;utf8,
      <svg xmlns='http://www.w3.org/2000/svg' width='800' height='360'>
        <defs>
          <linearGradient id='g' x1='0' x2='1'>
            <stop offset='0' stop-color='%23ffe6e6'/>
            <stop offset='1' stop-color='%23ffd6d6'/>
          </linearGradient>
        </defs>
        <rect width='100%' height='100%' fill='url(%23g)' rx='12'/>
        <text x='50%' y='38%' font-size='40' text-anchor='middle' fill='%230b2a3a' font-family='Segoe UI'>DERROTA</text>
        <text x='50%' y='58%' font-size='18' text-anchor='middle' fill='%230b2a3a' font-family='Segoe UI'>O tempo acabou — respira, tenta outra vez.</text>
      </svg>" alt="Derrota">
    <h2>Tempo esgotado</h2>
    <p>A variável <code>window.__DEFEAT__</code> foi ativada.</p>
    <div style="margin-top:12px">
      <button class="btn" id="dismissDefeat">Fechar</button>
    </div>
  </div>
</div>

<div id="overlay-victory" class="overlay" aria-hidden="true">
  <div class="card">
    <img src="data:image/svg+xml;utf8,
      <svg xmlns='http://www.w3.org/2000/svg' width='800' height='360'>
        <rect width='100%' height='100%' fill='%23e6fff0' rx='12'/>
        <text x='50%' y='40%' font-size='40' text-anchor='middle' fill='%2300462b' font-family='Segoe UI'>VITÓRIA</text>
        <text x='50%' y='60%' font-size='18' text-anchor='middle' fill='%2300462b' font-family='Segoe UI'>Parabéns — a variável window.__VICTORY__ está ativa.</text>
      </svg>" alt="Vitória">
    <h2>Você venceu</h2>
    <p>A variável <code>window.__VICTORY__</code> foi ativada.</p>
    <div style="margin-top:12px">
      <button class="btn" id="dismissVictory">Fechar</button>
    </div>
  </div>
</div>

<div id="confetti" class="confetti" aria-hidden="true"></div>

<script src="/socket.io/socket.io.js"></script> 
<script src="script.js"></script>
</body>
</html>
